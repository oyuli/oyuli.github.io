<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>anna's contact</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <a href="index.html"><img src="assets/logo.png" alt="Anna Wang" class="logo"></a>
    <nav>
      <a href="index.html">home</a>
      <a href="about.html">about</a>
      <div class="nav-work">
        <a href="work.html">work</a>
        <div class="work-dropdown">
          <a href="work-paintpencil.html">paint &amp; pencil</a>
          <a href="work-mixedmedia.html">mixed media</a>
          <a href="work-sculpture.html">sculpture</a>
          <a href="work-inprogress.html">in progress</a>
          <a href="work-sketches.html">sketches</a>
        </div>
      </div>
      <a href="cv.html">cv</a>
      <a href="contact.html" class="active">contact</a>
    </nav>
  </header>

  <main class="contact-main">
    <form class="contact-form" id="contact-form" action="https://formspree.io/f/xaqzkrak" method="POST">

      <div class="form-group">
        <label class="form-label">name</label>
        <div class="form-sublabels">
          <span class="form-sublabel">first</span>
          <span class="form-sublabel">last</span>
        </div>
        <div class="name-inputs">
          <input type="text" name="first" placeholder="enter first name...">
          <input type="text" name="last" placeholder="enter last name...">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">email</label>
        <input type="email" id="email" name="email" placeholder="enter email...">
      </div>

      <div class="form-group">
        <label class="form-label" for="subject">subject</label>
        <input type="text" id="subject" name="subject" placeholder="enter subject...">
      </div>

      <div class="form-group">
        <label class="form-label" for="message">message</label>
        <textarea id="message" name="message" placeholder="enter message..."></textarea>
      </div>

      <button type="submit" class="submit-btn">submit</button>

    </form>
  </main>

  <footer>© 2026 by Anna Wang</footer>

  <img src="assets/mouse.png" alt="" class="mouse-deco">

  <script>
    const form = document.getElementById('contact-form');
    const btn = form.querySelector('.submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        const res = await fetch(form.action, {
          method: 'POST',
          body: new FormData(form),
          headers: { 'Accept': 'application/json' }
        });
        if (res.ok) {
          btn.textContent = 're-submit';
          btn.classList.add('resubmit');
        }
      } catch {
        btn.textContent = 're-submit';
        btn.classList.add('resubmit');
      }
    });
  </script>

</body>
</html>
